name: Insurance News Bot

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install -r requirements.txt

    - run: python src/main.py
      env:
        WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
